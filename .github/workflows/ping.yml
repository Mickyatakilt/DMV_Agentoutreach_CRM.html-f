function saveScriptUrl(){
  const url=document.getElementById('script-url-input').value.trim();
  if(!url||!url.startsWith('https://script.google.com')){showToast('Please enter a valid Apps Script URL','error');return;}
  APPS_SCRIPT_URL=url;localStorage.setItem('crm_script_url',url);
  closeModal();showToast('Google Sheets connected!','success');render();
}

function exportCSV(){
  const filtered=getFiltered();
  const headers=['ID','Address','Phone','Agent','Offer','ARV','Marketing','Status','Source','Month','Date','Follow-Up Date','Listing Link','Comp Link','Notes'];
  const rows=filtered.map(l=>[l.id,l.address,l.phone,l.name,l.offer,l.arv,l.marketingType,l.status,l.leadSource,l.month,l.date,l.followUpDate,l.webLink,l.comps,(l.notes||'').replace(/,/g,';').replace(/\n/g,' ')].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='DMV_Leads_'+today()+'.csv';a.style.display='none';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},100);
  showToast('Exported '+filtered.length+' leads','success');
}

function renderSentOutTab(){
  const soLeads = leads.filter(l=>!l.deleted&&l.shared).map(function(l){ return Object.assign({kind:'lead'}, l); });
  const soTasks = jvLeads.filter(l=>!l.deleted&&l.shared).map(function(l){ return Object.assign({kind:'task'}, l); });
  const combined = soLeads.concat(soTasks).sort(function(a,b){
    var da = a.sharedAt||'', db = b.sharedAt||'';
    return db > da ? 1 : db < da ? -1 : (b.id - a.id);
  });
  const rows = combined.length===0
    ? '<div class="empty"><div class="empty-icon">&#128231;</div><h3>No leads sent out yet</h3><p>Use "Send to Team" on a saved lead or task to share it with a teammate</p></div>'
    : '<div class="table-container"><div class="table-wrap"><table>'
      +'<thead><tr>'
      +'<th>Type</th><th>Property</th><th>Phone</th><th>Offer</th><th>Status</th><th>Score</th><th>Sent To</th><th>Sent On</th><th>Follow-Up</th>'
      +'</tr></thead><tbody>'
      + combined.map(l=>`
        <tr onclick="${l.kind==='task'?'openJVDetail('+l.id+')':'openDetail('+l.id+')'}">
          <td>${l.kind==='task'?'<span style="font-size:9px;font-weight:900;color:#0369a1;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:4px;padding:1px 5px">TASK</span>':'<span style="font-size:9px;font-weight:900;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1px 5px">DMV</span>'}</td>
          <td><div class="address-cell">${esc(l.kind==='task'?(l.location||l.name):l.address)||''}</div></td>
          <td><div class="phone-cell">${l.phone?'<a href="#" data-phone="'+l.phone.split('/')[0].trim()+'" onclick="openGHL(this.dataset.phone,event)" style="color:var(--accent);text-decoration:none;font-weight:600" title="Open in GoHighLevel">'+esc(l.phone.split('/')[0].trim())+' &#8599;</a>':''}</div></td>
          <td><span class="money-val">${formatMoney(l.kind==='task'?l.askingPrice:l.offer)}</span></td>
          <td>${l.kind==='task'?statusBadge(l.jvStatus):statusBadge(l.status)}</td>
          <td>${leadScoreBadgeHTML(l.score)}</td>
          <td style="font-size:12px;color:var(--text2)">${esc(l.sharedWith)||''}</td>
          <td style="font-size:12px;color:var(--text3)">${l.sharedAt?new Date(l.sharedAt).toLocaleDateString():''}</td>
          <td>${l.followUpDate?followUpChip(l.followUpDate):'<span style="color:var(--text4);font-size:11px">&#8212;</span>'}</td>
        </tr>`).join('')
      +'</tbody></table></div></div>';

  document.getElementById('tab-content').innerHTML=`
    <div style="padding:16px 24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:16px;font-weight:700">&#128231; Sent Out</h2>
          <p style="font-size:12px;color:var(--text3);margin-top:3px">${combined.length} lead${combined.length!==1?'s':''} shared via email</p>
        </div>
      </div>
      ${rows}
    </div>`;
}

function renderNationwideTab(){
  const nwLeads = leads.filter(l=>!l.deleted&&l.nationwide==='Yes').sort(function(a,b){
    // Sort by real entry date, newest first. No hardcoded month list, so new months
    // (July, August, etc) always work automatically without code changes.
    var da = a.date||'', db = b.date||'';
    if(da && db) return db > da ? 1 : db < da ? -1 : (b.id - a.id);
    if(da) return -1;
    if(db) return 1;
    return b.id - a.id;
  });
  const fuc = {
    overdue: nwLeads.filter(l=>l.followUpDate&&getFUStatus(l.followUpDate)==='overdue').length,
    today:   nwLeads.filter(l=>l.followUpDate&&getFUStatus(l.followUpDate)==='today').length,
    soon:    nwLeads.filter(l=>l.followUpDate&&getFUStatus(l.followUpDate)==='soon').length,
  };

  const hotN=nwLeads.filter(l=>l.score==='Hot').length;
  const warmN=nwLeads.filter(l=>l.score==='Warm').length;
  const coldN=nwLeads.filter(l=>l.score==='Cold').length;

  const rows = nwLeads.length===0
    ? '<div class="empty"><div class="empty-icon">&#127758;</div><h3>No Nationwide leads yet</h3><p>Edit a lead and toggle Nationwide to Yes</p></div>'
    : '<div class="table-container"><div class="table-wrap"><table>'
      +'<thead><tr>'
      +'<th>Property</th><th>Phone</th><th>Offer</th><th>ARV</th><th>Marketing</th><th>Status</th><th>Score</th><th>Follow-Up</th><th>Month</th>'
      +'</tr></thead><tbody>'
      + nwLeads.map(l=>`
        <tr onclick="openDetail(${l.id})">
          <td><div class="address-cell">${esc(l.address)||''}</div></td>
          <td><div class="phone-cell">${l.phone?'<a href="#" data-phone="'+l.phone.split('/')[0].trim()+'" onclick="openGHL(this.dataset.phone,event)" style="color:var(--accent);text-decoration:none;font-weight:600" title="Open in GoHighLevel">'+esc(l.phone.split('/')[0].trim())+' &#8599;</a>':''}</div></td>
          <td><span class="money-val">${formatMoney(l.offer)}</span></td>
          <td><span class="arv-val">${formatMoney(l.arv)}</span></td>
          <td style="font-size:12px;color:var(--text2)">${esc(l.marketingType)||''}</td>
          <td>${statusBadge(l.status)}</td>
          <td>${leadScoreBadgeHTML(l.score)}</td>
          <td>${l.followUpDate?followUpChip(l.followUpDate):'<span style="color:var(--text4);font-size:11px">&#8212;</span>'}</td>
          <td><span class="month-tag">${l.month}</span></td>
        </tr>`).join('')
      +'</tbody></table></div></div>';

  document.getElementById('tab-content').innerHTML=`
    <div style="padding:16px 24px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
          <h2 style="font-size:16px;font-weight:700">&#127758; Nationwide Leads</h2>
          <p style="font-size:12px;color:var(--text3);margin-top:3px">${nwLeads.length} nationwide lead${nwLeads.length!==1?'s':''} &middot; <span style="color:#dc2626;font-weight:700">&#128308; ${hotN} Hot</span> &middot; <span style="color:#b45309;font-weight:700">&#128993; ${warmN} Warm</span> &middot; <span style="color:#2563eb;font-weight:700">&#128309; ${coldN} Cold</span></p>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Lead</button>
      </div>

      ${(fuc.overdue+fuc.today+fuc.soon)>0?`
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
        <div style="background:var(--red-bg);border:1.5px solid #fca5a5;border-radius:10px;padding:12px 16px">
          <div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;margin-bottom:4px">&#128308; Overdue</div>
          <div style="font-size:22px;font-weight:700;color:var(--red)">${fuc.overdue}</div>
        </div>
        <div style="background:var(--yellow-bg);border:1.5px solid #fcd34d;border-radius:10px;padding:12px 16px">
          <div style="font-size:11px;font-weight:700;color:var(--yellow);text-transform:uppercase;margin-bottom:4px">&#128993; Due Today</div>
          <div style="font-size:22px;font-weight:700;color:var(--yellow)">${fuc.today}</div>
        </div>
        <div style="background:var(--teal-bg);border:1.5px solid #5eead4;border-radius:10px;padding:12px 16px">
          <div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;margin-bottom:4px">&#128994; Next 3 Days</div>
          <div style="font-size:22px;font-weight:700;color:var(--teal)">${fuc.soon}</div>
        </div>
      </div>`:''}

      ${rows}
    </div>`;
}

function getJVStatuses(){
  var s = JSON.parse(localStorage.getItem('crm_jv_statuses')||'null') || ['New','Contacted','Follow Up','Under Contract','Closed','Pass'];
  if(!s.includes('Offer Sent')){ s = s.slice(0,-1).concat('Offer Sent', s.slice(-1)); saveJVStatuses(s); }
  return s;
}
function saveJVStatuses(s){ localStorage.setItem('crm_jv_statuses', JSON.stringify(s)); }
function getJVStatusColors(){
  var c = JSON.parse(localStorage.getItem('crm_jv_status_colors')||'null') || {
    'New':             {bg:'#e0f2fe',color:'#0369a1',border:'#7dd3fc'},
    'Contacted':       {bg:'#fef3c7',color:'#b45309',border:'#fcd34d'},
    'Follow Up':       {bg:'#ede9fe',color:'#7c3aed',border:'#c4b5fd'},
    'Under Contract':  {bg:'#dcfce7',color:'#16a34a',border:'#86efac'},
    'Closed':          {bg:'#d1fae5',color:'#059669',border:'#6ee7b7'},
    'Offer Sent':      {bg:'#dbeafe',color:'#2563eb',border:'#93c5fd'},
    'Pass':            {bg:'#f1f5f9',color:'#475569',border:'#cbd5e1'},
  };
  if(!c['Offer Sent']){ c['Offer Sent']={bg:'#dbeafe',color:'#2563eb',border:'#93c5fd'}; saveJVStatusColors(c); }
  return c;
}
function saveJVStatusColors(c){ localStorage.setItem('crm_jv_status_colors', JSON.stringify(c)); }

function jvStatusBadge(s){
  if(!s) return '<span class="badge badge-empty">&#8212;</span>';
  var c = getJVStatusColors()[s] || {bg:'#f1f5f9',color:'#475569',border:'#cbd5e1'};
  return '<span class="badge" style="background:'+c.bg+';color:'+c.color+';border-color:'+c.border+'">'+s+'</span>';
}
function scoreBadgeHTML(score){
  return score==='Hot' ? '<span class="badge" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5">&#128308; Hot</span>'
    : score==='Warm' ? '<span class="badge" style="background:#fef3c7;color:#b45309;border-color:#fcd34d">&#128993; Warm</span>'
    : score==='Cold' ? '<span class="badge" style="background:#dbeafe;color:#2563eb;border-color:#93c5fd">&#128309; Cold</span>'
    : '<span class="badge" style="background:#f0fdf4;color:#16a34a;border-color:#86efac">&#10003; Qualified</span>';
}
// Same Hot/Warm/Cold styling as scoreBadgeHTML, but shows a plain dash (not "Qualified") when unset —
// used on DMV/Nationwide leads where "Qualified" doesn't make sense as a default.
function leadScoreBadgeHTML(score){
  return score==='Hot' ? '<span class="badge" style="background:#fee2e2;color:#dc2626;border-color:#fca5a5">&#128308; Hot</span>'
    : score==='Warm' ? '<span class="badge" style="background:#fef3c7;color:#b45309;border-color:#fcd34d">&#128993; Warm</span>'
    : score==='Cold' ? '<span class="badge" style="background:#dbeafe;color:#2563eb;border-color:#93c5fd">&#128309; Cold</span>'
    : '<span class="badge badge-empty">&#8212;</span>';
}

var jvScoreFilter = '';
var jvStatusFilter = '';
var jvDateFrom = '';
var jvDateTo = '';
var jvSelectedLeads = new Set();

function renderJVLeadsTab(){
  var statuses = getJVStatuses();

  // Apply filters
  var filtered = jvLeads.filter(function(l){
    if(l.deleted) return false;
    if(jvScoreFilter && l.score !== jvScoreFilter) return false;
    if(jvStatusFilter && l.jvStatus !== jvStatusFilter) return false;
    if(jvDateFrom && l.dateAdded < jvDateFrom) return false;
    if(jvDateTo && l.dateAdded > jvDateTo) return false;
    return true;
  }).sort(function(a,b){ return b.id - a.id; });

  var hot = jvLeads.filter(function(l){return !l.deleted&&l.score==='Hot';}).length;
  var warm = jvLeads.filter(function(l){return !l.deleted&&l.score==='Warm';}).length;
  var cold = jvLeads.filter(function(l){return !l.deleted&&l.score==='Cold';}).length;

  // Follow-up section
  var withFU = jvLeads.filter(function(l){return !l.deleted&&l.followUpDate;}).sort(function(a,b){return a.followUpDate>b.followUpDate?1:-1;});
  var fuOverdue = withFU.filter(function(l){return getFUStatus(l.followUpDate)==='overdue';});
  var fuToday = withFU.filter(function(l){return getFUStatus(l.followUpDate)==='today';});
  var fuSoon = withFU.filter(function(l){return getFUStatus(l.followUpDate)==='soon';});

  function jvFUCard(title,items,color,bg){
    if(items.length===0) return '';
    return '<div style="background:'+bg+';border:1.5px solid '+color+';border-radius:10px;padding:12px 16px">'
      +'<div style="font-size:11px;font-weight:700;color:'+color+';text-transform:uppercase;margin-bottom:8px">'+title+' ('+items.length+')</div>'
      +items.map(function(l){
        var d=daysDiff(l.followUpDate);
        var lbl=d<0?Math.abs(d)+'d overdue':d===0?'Today':'In '+d+'d';
        return '<div onclick="openJVDetail('+l.id+')" style="cursor:pointer;padding:5px 0;border-bottom:1px solid '+color+'33;display:flex;justify-content:space-between;align-items:center">'
          +'<div><div style="font-weight:600;font-size:13px">'+esc(l.name||'Unknown')+'</div>'
          +(l.phone?'<div style="font-size:11px;color:var(--text3)">'+esc(l.phone)+'</div>':'')+'</div>'
          +'<div style="text-align:right"><div style="font-size:11px;font-weight:700;color:'+color+'">'+lbl+'</div>'
          +'<div style="font-size:10px;color:var(--text3)">'+l.followUpDate+'</div></div></div>';
      }).join('')+'</div>';
  }

  var fuSection = (fuOverdue.length+fuToday.length+fuSoon.length)>0 ? '<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:700;margin-bottom:10px">&#128197; Follow-Ups</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">'+jvFUCard('&#128308; Overdue',fuOverdue,'#dc2626','#fee2e2')+jvFUCard('&#128993; Due Today',fuToday,'#b45309','#fef3c7')+jvFUCard('&#128994; Next 3 Days',fuSoon,'#0d9488','#f0fdfa')+'</div></div>' : '';

  var selCount = jvSelectedLeads.size;
  var bulkBar = selCount > 0 ? '<div style="background:#fff3cd;border:1.5px solid #fcd34d;border-radius:8px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><span style="font-size:13px;font-weight:600;color:#b45309">&#10003; '+selCount+' lead'+(selCount!==1?'s':'')+' selected</span><div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="jvClearSelection()">Clear</button><button class="btn btn-sm" onclick="showJVBulkFollowUp()" style="background:#7c3aed;color:#fff;border-color:#7c3aed">&#128197; Set Follow-Up</button><button class="btn btn-danger btn-sm" onclick="jvDeleteSelected()">&#128465; Delete '+selCount+'</button></div></div>' : '';

  var statusOpts = statuses.map(function(s){return '<option value="'+s+'" '+(jvStatusFilter===s?'selected':'')+'>'+s+'</option>';}).join('');

  var rows = filtered.length === 0
    ? '<div class="empty"><div class="empty-icon">&#9989;</div><h3>No Tasks match filters</h3></div>'
    : '<div class="table-container"><div class="table-wrap"><table>'
      + '<thead><tr>'
      + '<th style="width:36px"><input type="checkbox" onchange="jvToggleSelectAll(this.checked)" style="width:15px;height:15px;cursor:pointer"></th>'
      + '<th>Name</th><th>Address</th><th>Phone</th><th>Score</th><th>Status</th><th>Asking Price</th><th>ARV</th><th>Profit Est</th><th>Follow-Up</th><th>Source</th><th>Date</th><th></th>'
      + '</tr></thead><tbody>'
      + filtered.map(function(l){
          return '<tr onclick="openJVDetail('+l.id+')" style="'+(jvSelectedLeads.has(l.id)?'background:#eff6ff;':'')+'">'
            + '<td onclick="event.stopPropagation()"><input type="checkbox" '+(jvSelectedLeads.has(l.id)?'checked':'')+' onchange="jvToggleSelect('+l.id+',this.checked)" style="width:15px;height:15px;cursor:pointer"></td>'
