            <div><strong>3.</strong> Delete all code, paste this, click <strong>Run</strong> first:<br><textarea readonly style="width:100%;margin-top:6px;font-size:11px;font-family:monospace;background:#f1f5f9;border:1px solid var(--border);border-radius:6px;padding:8px;height:130px;resize:none" onclick="this.select()" id="apps-script-code"></textarea></div>
            <div><strong>4.</strong> <strong>Deploy &rarr; New Deployment &rarr; Web App &rarr; Anyone &rarr; Deploy</strong></div>
            <div><strong>5.</strong> Paste URL here:<br><input id="script-url-input" type="text" class="form-input" style="margin-top:6px" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(APPS_SCRIPT_URL)}"></div>
