        for (var i = 0; i < jvLeads.length; i += 50) {
          await sbFetch('jv_leads', 'POST', jvLeads.slice(i, i+50).map(toJVRow));
        }
        return true;
      }
    }
  } catch(e) { console.error('JV load error:', e); }
  return false;
}
function showSyncStatus(status) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  if (!dot || !txt) return;
  const states = {
    loading:   ['#f59e0b', '⏳ Syncing with cloud...'],
    uploading: ['#f59e0b', '⬆️ Uploading to cloud...'],
    synced:    ['#16a34a', '☁️ Cloud synced -- works on any computer'],
    offline:   ['#dc2626', '⚠️ Offline -- changes saved locally only'],
  };
  const [color, msg] = states[status] || ['#94a3b8', ''];
  dot.style.background = color;
  txt.textContent = msg;
}

