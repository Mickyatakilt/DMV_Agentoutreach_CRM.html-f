function openGHL(phone, event){
  event.stopPropagation();
  var clean = (phone||'').replace(/[^0-9]/g,'');
  if(!clean) return;
  // Copy to clipboard
  try {
    navigator.clipboard.writeText(clean).then(function(){
      showToast('&#128222; '+clean+' copied! Paste in GHL search bar','success');
    });
  } catch(e){
    showToast('&#128222; '+clean+' -- open GHL and search this number','success');
  }
  // Open GHL contacts in named window -- reuses same tab if already open
  var url = 'https://app.gohighlevel.com/v2/location/' + GHL_LOCATION_ID + '/contacts/';
  window.open(url, 'ghl_window');
}

// Supabase helpers -- cross-browser compatible
async function sbFetch(path, method, body) {
  if(!method) method = 'GET';
  var opts = {
    method: method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if(body) opts.body = JSON.stringify(body);
  var r = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if(!r.ok){ var errTxt = await r.text(); throw new Error(errTxt); }
  var txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

