function renderFollowUpsTab(){
  // Source badges
  function srcBadge(type){
    if(type==='dmv')        return '<span style="font-size:9px;font-weight:900;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1px 5px;margin-right:4px">DMV</span>';
    if(type==='nationwide') return '<span style="font-size:10px;margin-right:4px">&#127758;</span>';
    if(type==='task')       return '<span style="font-size:10px;margin-right:4px">&#9989;</span>';
    return '';
  }

  // Combine ALL leads with follow-up dates
  var allFU = [];
  leads.forEach(function(l){
    if(!l.deleted && l.followUpDate){
      allFU.push({lead:l, type: l.nationwide==='Yes' ? 'nationwide' : 'dmv', isTask:false});
    }
  });
  jvLeads.forEach(function(l){
    if(!l.deleted && l.followUpDate){
      allFU.push({lead:l, type:'task', isTask:true});
    }
  });

  // Sort by follow-up date
  allFU.sort(function(a,b){ return a.lead.followUpDate > b.lead.followUpDate ? 1 : -1; });

  var overdue  = allFU.filter(function(x){ return getFUStatus(x.lead.followUpDate)==='overdue'; });
  var dueToday = allFU.filter(function(x){ return getFUStatus(x.lead.followUpDate)==='today'; });
  var soon     = allFU.filter(function(x){ return getFUStatus(x.lead.followUpDate)==='soon'; });
  var future   = allFU.filter(function(x){ return getFUStatus(x.lead.followUpDate)==='future'; });
  var total    = allFU.length;

  function fuItem(x){
    var l = x.lead;
    var d = daysDiff(l.followUpDate);
    var lbl = d<0 ? Math.abs(d)+'d overdue' : d===0 ? 'Today' : d===1 ? 'Tomorrow' : 'In '+d+'d';
    var fn = x.isTask ? 'openJVDetail('+l.id+')' : 'openDetail('+l.id+')';
    var title = l.address || l.name || l.location || '&#8212;';
    var badge = x.isTask ? (l.score ? scoreBadgeHTML(l.score) : jvStatusBadge(l.jvStatus||'')) : statusBadge(l.status);
    return '<div class="followup-item" onclick="'+fn+'" style="cursor:pointer">'
      + '<div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">'
      + srcBadge(x.type)
      + '<div class="followup-item-addr" style="margin:0">'+esc(title)+'</div>'
      + '</div>'
      + '<div class="followup-item-meta">'+badge+'<span>'+esc(l.name||'')+'</span>'+(l.phone?'<a href="#" data-phone="'+l.phone.split('/')[0].trim()+'" onclick="openGHL(this.dataset.phone,event)" style="color:var(--accent);text-decoration:none" title="Open in GoHighLevel">'+esc(l.phone.split('/')[0].trim())+' &#8599;</a>':'')+'</div>'
      + '<div class="followup-item-date">'+l.followUpDate+' &middot; '+lbl+'</div>'
      + (l.notes?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+esc((l.notes||'').substring(0,80))+(l.notes&&l.notes.length>80?'&#8230;':'')+'</div>':'')
      + '</div>';
  }

  function fuCard(title, items, hColor, hBg, icon){
    var rows = items.length===0
      ? '<div class="followup-empty">None</div>'
      : items.map(fuItem).join('');
    return '<div class="followup-group">'
      + '<div class="followup-group-header" style="background:'+hBg+';color:'+hColor+'">'
      + '<span>'+icon+' '+title+'</span>'
      + '<span style="background:'+hColor+';color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">'+items.length+'</span>'
      + '</div><div style="max-height:360px;overflow-y:auto">'+rows+'</div></div>';
  }

  var futureRows = future.length===0
    ? '<div class="followup-empty">No upcoming follow-ups</div>'
    : future.map(fuItem).join('');

  // Legend
  var legend = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap">'
    + '<span style="font-size:12px;color:var(--text3);font-weight:600">Legend:</span>'
    + '<span style="display:flex;align-items:center;gap:4px;font-size:12px"><span style="font-size:9px;font-weight:900;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1px 5px">DMV</span> DMV Lead</span>'
    + '<span style="display:flex;align-items:center;gap:4px;font-size:12px">&#127758; Nationwide</span>'
    + '<span style="display:flex;align-items:center;gap:4px;font-size:12px">&#9989; Task</span>'
    + '</div>';

  document.getElementById('tab-content').innerHTML = '<div class="followup-container">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
    + '<div><h2 style="font-size:16px;font-weight:700">&#128197; Follow-Up Dashboard</h2>'
    + '<p style="font-size:12px;color:var(--text3);margin-top:3px">Today is '+today()+' &middot; '+total+' total follow-ups</p></div>'
    + '<button class="btn btn-primary btn-sm" onclick="openAdd()">+ Add Lead</button></div>'
    + legend
    + '<div class="followup-grid">'
    + fuCard('Overdue', overdue, '#dc2626', '#fee2e2', '&#128308;')
    + fuCard('Due Today', dueToday, '#b45309', '#fef3c7', '&#128993;')
    + fuCard('Next 3 Days', soon, '#0d9488', '#f0fdfa', '&#128994;')
    + '</div>'
    + '<div class="followup-group" style="margin-top:14px">'
    + '<div class="followup-group-header" style="background:var(--surface3);color:var(--text2)">'
    + '<span>&#128198; All Upcoming</span>'
    + '<span style="background:var(--text3);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px">'+future.length+'</span>'
    + '</div><div style="max-height:500px;overflow-y:auto">'+futureRows+'</div></div>'
    + '</div>';
}

function renderPagination(total){
  const tp=Math.ceil(total/PAGE_SIZE);
  const pages=[];
  for(let i=Math.max(1,currentPage-2);i<=Math.min(tp,currentPage+2);i++) pages.push('<button class="page-btn '+(i===currentPage?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>');
  return '<div class="pagination"><span>'+(((currentPage-1)*PAGE_SIZE)+1)+'&#8211;'+Math.min(currentPage*PAGE_SIZE,total)+' of '+total+'</span><div class="page-btns"><button class="page-btn" onclick="goPage(1)" '+(currentPage===1?'disabled':'')+'>&#171;</button><button class="page-btn" onclick="goPage('+(currentPage-1)+')" '+(currentPage===1?'disabled':'')+'>&#8249;</button>'+pages.join('')+'<button class="page-btn" onclick="goPage('+(currentPage+1)+')" '+(currentPage===tp?'disabled':'')+'>&#8250;</button><button class="page-btn" onclick="goPage('+tp+')" '+(currentPage===tp?'disabled':'')+'>&#187;</button></div></div>';
}

function openDetail(id){modalLead=leads.find(l=>l.id===id);editMode=false;isNew=false;renderDetailModal();}
function monthNameFromDate(dateStr){
  if(!dateStr) return '';
  var names=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var parts=dateStr.split('-'); // 'YYYY-MM-DD', avoid timezone shift from `new Date(str)`
  var mIdx=parseInt(parts[1],10)-1;
  return names[mIdx]||'';
}
function ensureMonthOption(name){
  if(!name) return;
  var dd=getDropdowns();
  if(!dd.months.includes(name)){ dd.months.push(name); saveDropdowns(dd); }
}
function syncMonthFromDate(dateVal){
  var name=monthNameFromDate(dateVal);
  if(!name) return;
  ensureMonthOption(name);
  var sel=document.getElementById('f-month');
  if(!sel) return;
  if(!Array.from(sel.options).some(function(o){return o.value===name;})){
    var opt=document.createElement('option'); opt.value=name; opt.textContent=name; sel.appendChild(opt);
  }
  sel.value=name;
}
function openAdd(){
  const dd=getDropdowns();
