  var redfinUrl = buildRedfinUrl(l.address);
  document.getElementById('app').innerHTML = `
    <div class="header"><div class="logo">&#127968; Property Update</div></div>
    <div style="max-width:640px;margin:24px auto;padding:0 16px">
      <div class="modal" style="position:static;box-shadow:var(--shadow-md)">
        <div class="modal-header"><div><div class="modal-title">${esc(l.address)||'No Address'}</div><div class="modal-subtitle">Lead #${l.id}${l.date?' &middot; '+l.date:''}</div></div></div>
        <div class="modal-body">
          <div class="detail-section"><div class="detail-section-title">Property &amp; Contact</div>
            <div class="detail-grid">
              <div class="detail-item"><span class="detail-label">Phone</span><span class="detail-val">${esc(l.phone)||''}</span></div>
              <div class="detail-item"><span class="detail-label">Offer</span><span class="detail-val" style="color:var(--accent);font-weight:700">${formatMoney(l.offer)}</span></div>
              <div class="detail-item"><span class="detail-label">ARV</span><span class="detail-val" style="color:var(--green);font-weight:700">${formatMoney(l.arv)}</span></div>
            </div>
          </div>
          <div class="detail-section"><div class="detail-section-title">Links</div>
            <div style="display:flex;flex-direction:column;gap:6px">
              ${zillowUrl?'<div><a href="'+zillowUrl+'" target="_blank" class="detail-link">&#127968; View on Zillow &#8599;</a> <span style="color:var(--text3);font-size:11px">&middot;</span> <a href="'+redfinUrl+'" target="_blank" style="color:var(--text3);font-size:12px">Try Redfin</a></div>':''}
              ${l.webLink&&l.webLink.startsWith('http')?'<div><a href="'+esc(l.webLink)+'" target="_blank" class="detail-link">View Listing &#8599;</a></div>':''}
              ${l.comps&&l.comps.startsWith('http')?'<div><a href="'+esc(l.comps.split(' ')[0])+'" target="_blank" class="detail-link">View Comps &#8599;</a></div>':''}
            </div>
          </div>
          <div class="form-section"><div class="form-section-title">Update This Lead</div>
            <div class="form-grid">
              <div class="form-field"><label class="form-label">Marketing Type</label><select id="shared-mkt" class="form-select">${mktOpts}</select></div>
              <div class="form-field"><label class="form-label">Status</label><select id="shared-status" class="form-select">${statusOpts}</select></div>
              <div class="form-field"><label class="form-label">Follow-Up Date</label><input id="shared-followup" type="date" class="form-input" value="${l.followUpDate||''}"><div class="field-hint"><a href="#" onclick="event.preventDefault();openGCalForShared('shared-followup','${esc(l.address||'Lead')}');" style="color:var(--accent)">&#128197; Add to Google Calendar</a></div></div>
            </div>
            <div class="form-field" style="margin-top:10px"><label class="form-label">Notes</label><textarea id="shared-notes" class="form-textarea" placeholder="Notes, conversation details, next steps...">${esc(l.notes)}</textarea></div>
          </div>
          <div id="shared-save-status" style="font-size:12px;color:var(--green);margin-bottom:8px"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-primary" onclick="saveSharedLead(${l.id})">&#128190; Save Update</button></div>
      </div>
    </div>`;
}
async function saveSharedLead(id) {
  var body = {
    marketing_type: document.getElementById('shared-mkt').value,
    status: document.getElementById('shared-status').value,
    follow_up_date: document.getElementById('shared-followup').value,
    notes: document.getElementById('shared-notes').value.trim(),
    updated_by: 'Shared Link', updated_at: today()
  };
  var statusEl = document.getElementById('shared-save-status');
  try {
    await sbFetch('leads?id=eq.' + id, 'PATCH', body);
    if(statusEl) statusEl.textContent = '\u2713 Saved — thank you!';
  } catch(e) {
    if(statusEl) { statusEl.style.color = 'var(--red)'; statusEl.textContent = 'Could not save — please try again.'; }
  }
}

