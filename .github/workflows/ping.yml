function onMktChange(val){
  const mkt=val.toLowerCase().trim();
  const el=document.getElementById('f-status');
  if(!el) return;
  if(mkt==='sold') el.value='Sold';
  else if(mkt==='rejected') el.value='Offer Rejected';
  else if(mkt==='pass') el.value='Pass';
  else if(mkt==='foreclosure') el.value='Foreclosure';
}
function buildZillowUrl(address){
  var slug = (address||'').trim().replace(/[#.,]/g,'').replace(/\s+/g,'-');
  if(!slug) return '';
  return 'https://www.zillow.com/homes/'+encodeURIComponent(slug)+'_rb/';
}
function buildRedfinUrl(address){
  // Redfin doesn't offer a clean public address-to-URL scheme like Zillow, so this
  // falls back to a Google search scoped to redfin.com, which reliably surfaces the listing.
  var addr = (address||'').trim();
  if(!addr) return '';
  return 'https://www.google.com/search?q=' + encodeURIComponent('site:redfin.com ' + addr);
}
function toggleZillowLink(address){
  var wrap = document.getElementById('zillow-link-wrap');
  if(!wrap) return;
  wrap.style.display = (address||'').trim() ? '' : 'none';
}
function openZillow(){
  var addrInput = document.getElementById('f-address');
  var addr = addrInput ? addrInput.value : (modalLead ? modalLead.address : '');
  var url = buildZillowUrl(addr);
  if(url) window.open(url, '_blank');
}
function openRedfin(){
  var addrInput = document.getElementById('f-address');
  var addr = addrInput ? addrInput.value : (modalLead ? modalLead.address : '');
  var url = buildRedfinUrl(addr);
  if(url) window.open(url, '_blank');
}
function findJVDup(addr,excludeId){const n=normalizeAddr(addr); if(!n) return null; return jvLeads.find(l=>!l.deleted&&l.id!==excludeId&&normalizeAddr(l.location)===n)||null;}
let jvDupTarget=null;
function checkJVDup(addr,excludeId){
  const dup=findJVDup(addr,excludeId);
  const warn=document.getElementById('jv-dup-warn');
  const inp=document.getElementById('t-location');
  if(!warn||!inp) return;
  if(dup){jvDupTarget=dup.id;document.getElementById('jv-dup-lnk').textContent=dup.location;warn.classList.add('show');inp.classList.add('dup');}
  else{jvDupTarget=null;warn.classList.remove('show');inp.classList.remove('dup');}
}
function openJVDup(){if(!jvDupTarget) return;closeModal();openJVDetail(jvDupTarget);}

// Builds a one-click "Add to Google Calendar" link for a follow-up date. No API/OAuth needed --
// just Google's own event-creation URL, pre-filled. Opens in a new tab for the person to confirm/save.
function buildGCalUrl(dateStr, title, details){
  if(!dateStr) return '';
  var startCompact = dateStr.replace(/-/g,'');
  var dt = new Date(dateStr+'T00:00:00');
  dt.setDate(dt.getDate()+1);
  var pad = function(n){ return String(n).length<2 ? '0'+n : ''+n; };
  var endCompact = dt.getFullYear() + pad(dt.getMonth()+1) + pad(dt.getDate());
  return 'https://www.google.com/calendar/render?action=TEMPLATE'
    + '&text=' + encodeURIComponent(title||'Follow-up')
    + '&dates=' + startCompact + '/' + endCompact
    + '&details=' + encodeURIComponent(details||'');
}
function openGCalForLead(){
  var dateEl = document.getElementById('f-followup');
  var addrEl = document.getElementById('f-address');
  var date = dateEl ? dateEl.value : (modalLead?modalLead.followUpDate:'');
  var addr = addrEl ? addrEl.value : (modalLead?modalLead.address:'');
  if(!date){ showToast('Set a follow-up date first','error'); return; }
  var url = buildGCalUrl(date, 'Follow up: '+(addr||'Lead'), 'Lead follow-up reminder for '+(addr||''));
  window.open(url,'_blank');
}
function openGCalForTask(){
  var dateEl = document.getElementById('t-followup');
  var nameEl = document.getElementById('t-name');
  var date = dateEl ? dateEl.value : '';
  var name = nameEl ? nameEl.value : '';
  if(!date){ showToast('Set a follow-up date first','error'); return; }
  var url = buildGCalUrl(date, 'Follow up: '+(name||'Task'), 'Task follow-up reminder');
  window.open(url,'_blank');
}
function openGCalForShared(dateElId, titleText){
  var dateEl = document.getElementById(dateElId);
  var date = dateEl ? dateEl.value : '';
  if(!date){ showToast('Set a follow-up date first','error'); return; }
  var url = buildGCalUrl(date, 'Follow up: '+titleText, 'Follow-up reminder');
  window.open(url,'_blank');
}

function checkDup(addr,excludeId){
  const dup=findDup(addr,excludeId);
  const warn=document.getElementById('dup-warn');
  const inp=document.getElementById('f-address');
  if(dup){dupTarget=dup.id;document.getElementById('dup-lnk').textContent=dup.address;warn.classList.add('show');inp.classList.add('dup');}
  else{dupTarget=null;warn.classList.remove('show');inp.classList.remove('dup');}
}
function openDup(){if(!dupTarget) return;closeModal();openDetail(dupTarget);}

async function saveLead(){
  const addr=document.getElementById('f-address').value.trim();
  if(!addr){showToast('Address is required','error');return;}
  const dup=findDup(addr,modalLead.id);
  if(dup&&!confirm('Duplicate address found:\n"'+dup.address+'"\n\nSave anyway?')) return;
  const l=modalLead;
  const oldFollowUp=l.followUpDate;
  l.address=addr;l.name=document.getElementById('f-name').value.trim();l.phone=document.getElementById('f-phone').value.trim();
  l.offer=document.getElementById('f-offer').value.trim();l.arv=document.getElementById('f-arv').value.trim();
  l.marketingType=document.getElementById('f-mkt').value;l.status=document.getElementById('f-status').value;
  l.leadSource=document.getElementById('f-src').value;l.month=document.getElementById('f-month').value;
  l.date=document.getElementById('f-date').value;l.followUpDate=document.getElementById('f-followup').value;
  l.webLink=document.getElementById('f-link').value.trim();l.comps=document.getElementById('f-comps').value.trim();
  l.notes=document.getElementById('f-notes').value.trim();
  l.score=document.getElementById('f-score').value;
  const nwEl=document.querySelector('input[name="f-nationwide"]:checked');
  l.nationwide=nwEl?nwEl.value:'';
  l.updatedBy=currentUser.name;l.updatedAt=today();
  if(l.followUpDate && l.followUpDate!==oldFollowUp){
    if(!l.activityLog) l.activityLog=[];
    l.activityLog.push({type:'Follow-Up Set',by:currentUser.name,at:new Date().toISOString(),note:'Follow-up scheduled for '+l.followUpDate});
  }
  if(isNew){leads.push(l);showToast('Lead added!','success');}
  else{const i=leads.findIndex(x=>x.id===l.id);if(i>=0)leads[i]=l;showToast('Updated!','success');}
  save();closeModal();render();
  saveLeadToSupabase(l);
  if(APPS_SCRIPT_URL) syncLeadToSheet(l);
}
function deleteLead(){
  if(!confirm('Delete this lead?\n\n'+modalLead.address)) return;
  const delId=modalLead.id;
  const wasNationwide=modalLead.nationwide==='Yes';
  const l=leads.find(x=>x.id===delId);
  if(!l) return;
  l.deleted=true; l.deletedAt=new Date().toISOString();
  save();closeModal();
  if(wasNationwide) activeTab='nationwide';
  render();
  showToast('Lead deleted','warning',function(){
    l.deleted=false; l.deletedAt='';
    save(); render(); saveLeadToSupabase(l);
    showToast('Restored','success');
  });
  saveLeadToSupabase(l);
}

