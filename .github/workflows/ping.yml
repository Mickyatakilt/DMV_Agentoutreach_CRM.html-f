function importJVCSV(input){
  var file=input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    function parseCSV(str){
      var rows=[],row=[],field='',inQuote=false;
      for(var i=0;i<str.length;i++){
        var c=str[i];
        if(c==='"'){if(inQuote&&str[i+1]==='"'){field+='"';i++;}else inQuote=!inQuote;}
        else if(c===','&&!inQuote){row.push(field);field='';}
        else if((c==='\n'||c==='\r')&&!inQuote){
          if(c==='\r'&&str[i+1]==='\n')i++;
          row.push(field);field='';
          if(row.some(function(f){return f.trim();}))rows.push(row);
          row=[];
        }else field+=c;
      }
      if(field||row.length){row.push(field);if(row.some(function(f){return f.trim();}))rows.push(row);}
      return rows;
    }
    var parsed=parseCSV(text);
    if(parsed.length<2){showToast('No data found','error');return;}
    var headers=parsed[0].map(function(h){return h.trim().toLowerCase();});
    var imported=0,skipped=0;
    var maxId=jvLeads.length?Math.max.apply(null,jvLeads.map(function(l){return l.id;})):0;
    var existingLinks={};
    jvLeads.forEach(function(l){if(l.fbLink)existingLinks[l.fbLink]=true;});
    for(var i=1;i<parsed.length;i++){
      var vals=parsed[i];
      var row={};
      headers.forEach(function(h,idx){row[h]=vals[idx]?vals[idx].trim():'';});
      var fbLink=row['post_url']||row['facebook post link']||row['facebook link']||row['link']||row['url']||'';
      if(fbLink&&existingLinks[fbLink]){skipped++;continue;}
      var name=row['name']||row['poster_name']||row['agent']||'';
      var phone=row['phone']||row['phone number']||'';
      var notes=row['notes']||row['note']||row['post_text']||'';
      var location=row['location']||row['address']||row['city']||'';
      var score=row['score']||row['rating']||row['category']||'';
      var askingPrice=row['asking price']||row['askingprice']||row['price']||row['offer']||'';
      var arv=row['arv']||'';
      var profitEst=row['profit est']||row['profit']||row['profit_est']||'';
      var group=row['group']||row['source group']||row['source']||'';
      var dateAdded=row['date_scraped']||row['date']||today();
      if(!name&&!phone&&!notes){skipped++;continue;}
      var lead={
        id:++maxId,name:name,phone:phone,score:score||'Qualified',
        notes:notes,fbLink:fbLink,sourceGroup:group,
        location:location,askingPrice:askingPrice,arv:arv,profitEst:profitEst,
        followUpDate:row['follow-up date']||row['follow_up_date']||'',
        jvStatus:'',dateAdded:dateAdded
      };
      jvLeads.push(lead);
      if(fbLink)existingLinks[fbLink]=true;
      saveJVToSupabase(lead);
      imported++;
    }
    saveJV();renderJVLeadsTab();
    var msg='Imported '+imported+' JV leads!';
    if(skipped>0)msg+=' ('+skipped+' skipped)';
    showToast(msg,'success');
    input.value='';
  };
  reader.readAsText(file);
}

