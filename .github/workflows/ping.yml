function statusBadge(s){
  if(!s) return '<span class="badge badge-empty">&#8212;</span>';
  const colors = getStatusColors();
  const c = colors[s];
  if(c) return '<span class="badge" style="background:'+c.bg+';color:'+c.color+';border-color:'+c.border+'">'+s+'</span>';
  // Fallback for custom statuses not in color map
  return '<span class="badge badge-empty">'+s+'</span>';
}
function formatMoney(v){
  if(!v||v==='nan') return '';
  const s=String(v).trim();
  const n=parseFloat(s.replace(/[$,KkMm ]/g,''));
  if(isNaN(n)||n===0) return s.length>20?s.substring(0,20)+'&#8230;':s;
  const mult=/[Mm]$/.test(s)?1000000:/[Kk]$/.test(s)?1000:1;
  const val=n*mult;
  if(val>=1000000) return '$'+(val/1000000).toFixed(2)+'M';
  return '$'+Math.round(val).toLocaleString();
}
function normalizeAddr(a){return(a||'').toLowerCase().trim().replace(/  /g,' ').replace(/[.,]/g,'');}
function findDup(addr,excludeId){const n=normalizeAddr(addr); if(!n) return null; return leads.find(l=>!l.deleted&&l.id!==excludeId&&normalizeAddr(l.address)===n)||null;}
function getNextId(){return leads.length?Math.max(...leads.map(l=>l.id))+1:1;}
function getFUCounts(){
  const w=leads.filter(l=>!l.deleted&&l.followUpDate);
  return {overdue:w.filter(l=>getFUStatus(l.followUpDate)==='overdue').length,today:w.filter(l=>getFUStatus(l.followUpDate)==='today').length,soon:w.filter(l=>getFUStatus(l.followUpDate)==='soon').length,total:w.length};
}
function getFiltered(){
  let data=leads.filter(l=>{
    if(l.deleted) return false;
    // When searching, include nationwide leads too
    if(l.nationwide==='Yes' && !filters.search) return false;
    const q=filters.search.toLowerCase();
    if(q&&!['address','name','phone','notes','marketingType'].some(k=>(l[k]||'').toLowerCase().includes(q))) return false;
    if(filters.status&&l.status!==filters.status) return false;
    if(filters.month&&l.month!==filters.month) return false;
    if(filters.source&&l.leadSource!==filters.source) return false;
    if(activeStatFilter&&l.status!==activeStatFilter) return false;
    if(leadScoreFilter&&l.score!==leadScoreFilter) return false;
    return true;
  });
  data.sort((a,b)=>{
    if(sortField==='month'){
      // Default: most recent entry date first
      var da = a.date||'', db = b.date||'';
      if(da && db) return db > da ? sortDir : db < da ? -sortDir : (b.id - a.id);
      if(da) return -sortDir;
      if(db) return sortDir;
      return (b.id - a.id);
    }
    let av=a[sortField]||'',bv=b[sortField]||'';
    if(sortField==='offer'||sortField==='arv'){av=parseFloat(String(av).replace(/[$,KkMm]/g,''))||0;bv=parseFloat(String(bv).replace(/[$,KkMm]/g,''))||0;}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  return data;
}
function getStats(){const activeLeads=leads.filter(l=>!l.deleted);return {total:activeLeads.length,...Object.fromEntries(getDropdowns().statuses.map(s=>[s,activeLeads.filter(l=>l.status===s).length]))};}

async function syncLeadToSheet(lead){
  if(!APPS_SCRIPT_URL) return;
  try{
    const row=[lead.id,lead.address,lead.name,lead.phone,lead.offer,lead.arv,lead.marketingType,lead.status,lead.leadSource,lead.month,lead.date,lead.followUpDate,lead.webLink,lead.comps,(lead.notes||'').replace(/\n/g,' '),lead.updatedBy||'',lead.updatedAt||today()];
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'appendRow',sheetId:SHEET_ID,sheetName:'Leads',row})});
    lastSynced=new Date().toLocaleTimeString();
    localStorage.setItem('crm_last_synced',lastSynced);
  }catch(e){}
}

