  return items.map(function(item,i){
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'
      +'<span style="flex:1;font-size:13px">'+esc(item)+'</span>'
      +'<button onclick="removeDropdownItem(\''+key+'\','+i+')" style="background:var(--red-bg);border:1px solid #fca5a5;color:var(--red);border-radius:5px;padding:2px 8px;cursor:pointer;font-size:11px;font-weight:600">Remove</button>'
      +'</div>';
  }).join('');
}
