var newTaskAttachments = [];

function handleNewTaskFiles(input){
  var files = Array.from(input.files);
  if(!files.length) return;
  var pending = files.length;
  files.forEach(function(file){
    var reader = new FileReader();
    reader.onload = function(e){
      var sizeKB = (file.size/1024).toFixed(1);
      var sizeStr = sizeKB > 1024 ? (sizeKB/1024).toFixed(1)+'MB' : sizeKB+'KB';
      newTaskAttachments.push({name: file.name, size: sizeStr, data: e.target.result, addedAt: today()});
      pending--;
      if(pending === 0){
        renderNewTaskAttachments();
        showToast(files.length+' file'+(files.length!==1?'s':'')+' attached!','success');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderNewTaskAttachments(){
  var list = document.getElementById('task-attachments-list');
  if(!list) return;
  if(newTaskAttachments.length === 0){ list.innerHTML = ''; return; }
  list.innerHTML = newTaskAttachments.map(function(f,i){
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'
      +'<span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">&#128206; '+esc(f.name)+'</span>'
      +'<span style="font-size:10px;color:var(--text3)">'+f.size+'</span>'
      +'<button onclick="newTaskAttachments.splice('+i+',1);renderNewTaskAttachments()" style="background:var(--red-bg);border:1px solid #fca5a5;color:var(--red);border-radius:5px;padding:2px 6px;cursor:pointer;font-size:11px">&#128465;</button>'
      +'</div>';
  }).join('');
}

function saveNewTask(){
  var name = document.getElementById('t-name').value.trim();
  var phone = document.getElementById('t-phone').value.trim();
  var notes = document.getElementById('t-notes').value.trim();
  var location = document.getElementById('t-location').value.trim();
  if(!name && !phone && !notes){showToast('Please fill in at least one field','error');return;}
  var dup = findJVDup(location, null);
  if(dup && !confirm('Duplicate address found:\n"'+dup.location+'"\n\nSave anyway?')) return;
  var maxId = jvLeads.length ? Math.max.apply(null, jvLeads.map(function(l){return l.id;})) : 0;
  var lead = {
    id: ++maxId,
    name: name,
    phone: phone,
    score: document.getElementById('t-score').value,
    notes: notes,
    fbLink: '',
    sourceGroup: '',
    location: location,
    askingPrice: document.getElementById('t-askingprice').value.trim(),
    arv: document.getElementById('t-arv').value.trim(),
    profitEst: '',
    followUpDate: document.getElementById('t-followup').value,
    jvStatus: document.getElementById('t-status').value,
    dateAdded: document.getElementById('t-date').value || today()
  };
  jvLeads.push(lead);
  saveJV();
  saveJVToSupabase(lead);
  // Save attachments if any
  if(newTaskAttachments.length > 0){
    saveAttachments('task', lead.id, newTaskAttachments);
    newTaskAttachments = [];
  }
  closeModal();
  renderJVLeadsTab();
  showToast('Task added!','success');
}

function deleteJVLead(id){
  if(!confirm('Delete this JV lead?')) return;
  var l=jvLeads.find(function(x){return x.id===id;});
  if(!l) return;
  l.deleted=true; l.deletedAt=new Date().toISOString();
  saveJV();renderJVLeadsTab();saveJVToSupabase(l);
  showToast('JV lead deleted','warning',function(){
    l.deleted=false; l.deletedAt='';
    saveJV(); renderJVLeadsTab(); saveJVToSupabase(l);
    showToast('Restored','success');
  });
}


function onSearch(v){
  filters.search=v;currentPage=1;selectedLeads.clear();
  // Only re-render the content below toolbar to preserve search focus
  var filtered=getFiltered();
  var start=(currentPage-1)*PAGE_SIZE,end=start+PAGE_SIZE;
  var hasFilter=filters.status||filters.month||filters.source||filters.search||activeStatFilter;
  var delFilterBtn=hasFilter?'<button class="btn btn-danger btn-sm" onclick="deleteAllFiltered()">&#128465; Delete All '+filtered.length+'</button>':'';
  var selCount=selectedLeads.size;
  var bulkBar=selCount>0?'<div style="background:#fff3cd;border:1.5px solid #fcd34d;border-radius:8px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;margin:8px 24px 0;"><span style="font-size:13px;font-weight:600;color:#b45309">&#10003; '+selCount+' lead'+(selCount!==1?'s':'')+' selected</span><div style="display:flex;gap:8px"><button class="btn btn-secondary btn-sm" onclick="clearSelection()">Clear</button><button class="btn btn-danger btn-sm" onclick="deleteSelected()">&#128465; Delete '+selCount+'</button></div></div>':'';
  var content2=filtered.length===0?'<div class="empty"><div class="empty-icon">&#128269;</div><h3>No leads match your search</h3></div>':(view==='table'?renderTable(filtered,start,end):renderCards(filtered,start,end));
  var pagination=filtered.length>PAGE_SIZE?renderPagination(filtered.length):'';
  // Update result count
  var countEl=document.querySelector('.result-count');
  if(countEl) countEl.textContent=filtered.length+' leads';
  // Update delete filter btn
  var delEl=document.querySelector('.del-filter-btn');
  // Re-render only the dynamic parts below toolbar
  var tableEl=document.querySelector('.table-container')||document.querySelector('.cards-container')||document.querySelector('.empty');
  if(tableEl){
    var wrapper=document.createElement('div');
    wrapper.innerHTML=bulkBar+content2+pagination;
    // Remove old bulk bar, table, pagination
    var parent=tableEl.parentNode;
    // Find and remove bulk bar if exists
    var oldBulk=parent.querySelector('[style*="fff3cd"]');
    if(oldBulk) oldBulk.remove();
    // Remove old pagination
    var oldPag=parent.querySelector('.pagination');
    if(oldPag) oldPag.remove();
    // Replace table
    var newTable=wrapper.querySelector('.table-container')||wrapper.querySelector('.cards-container')||wrapper.querySelector('.empty');
    if(newTable) tableEl.replaceWith(newTable);
    // Add bulk bar before table
    var newBulk=wrapper.querySelector('[style*="fff3cd"]');
    var currentTable=parent.querySelector('.table-container')||parent.querySelector('.cards-container')||parent.querySelector('.empty');
    if(newBulk && currentTable) currentTable.before(newBulk);
    // Add pagination after table
    var newPag=wrapper.querySelector('.pagination');
    if(newPag && currentTable) currentTable.after(newPag);
  } else {
    renderLeadsTab();
  }
  // Update toolbar right count and delete btn
  var toolbarRight=document.querySelector('.toolbar-right');
  if(toolbarRight){
    var span=toolbarRight.querySelector('.result-count');
    if(span) span.textContent=filtered.length+' leads';
    var oldDel=toolbarRight.querySelector('.btn-danger');
    if(oldDel) oldDel.remove();
    if(hasFilter){
      var btn=document.createElement('button');
      btn.className='btn btn-danger btn-sm';
      btn.innerHTML='&#128465; Delete All '+filtered.length;
      btn.onclick=deleteAllFiltered;
      if(span) span.after(btn);
    }
  }
}
function onFilter(k,v){filters[k]=v;currentPage=1;selectedLeads.clear();renderLeadsTab();}
function setSort(f){sortField===f?sortDir=-sortDir:(sortField=f,sortDir=1);currentPage=1;renderLeadsTab();}
function setView(v){view=v;renderLeadsTab();}
function goPage(p){currentPage=p;selectedLeads.clear();renderLeadsTab();window.scrollTo(0,100);}
function setStatFilter(f){activeStatFilter=f===activeStatFilter?'':f;currentPage=1;selectedLeads.clear();renderLeadsTab();}
// ===== Activity Log & Notification Banner =====
// Tracks manual "Called / Texted / Followed Up / Note" entries per lead, plus auto-entries
// when a Follow-Up date is set. Notification banner shows what's new since the person last checked.
function logActivity(kind, id, type, note){
  var arr = kind==='task' ? jvLeads : leads;
  var l = arr.find(function(x){return x.id===id;});
  if(!l) return;
  if(!l.activityLog) l.activityLog=[];
  l.activityLog.push({type:type, by:currentUser.name, at:new Date().toISOString(), note:note||''});
  if(kind==='task'){ saveJV(); }
  else { localStorage.setItem('crm_leads', JSON.stringify(leads)); saveLeadToSupabase(l); }
  var noteInput = document.getElementById(kind==='task'?'jv-activity-note':'lead-activity-note');
  if(noteInput) noteInput.value='';
  if(kind==='task') openJVDetail(id); else { modalLead=l; renderDetailModal(); }
  showToast(type+' logged','success');
}
function activityIcon(type){
  return type==='Called' ? '&#128222;' : type==='Texted' ? '&#128172;' : type==='Follow-Up Set' ? '&#128197;' : type==='Followed Up' ? '&#9989;' : '&#128221;';
}
function renderActivityLog(kind, id, log){
  log = log || [];
  var sorted = log.slice().sort(function(a,b){ return new Date(b.at) - new Date(a.at); });
  var list = sorted.length===0
    ? '<div style="font-size:12px;color:var(--text3);padding:6px 0">No activity logged yet.</div>'
    : sorted.map(function(e){
        var when = new Date(e.at).toLocaleString();
        return '<div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">'
          +'<span>'+activityIcon(e.type)+'</span>'
          +'<div style="flex:1"><b>'+esc(e.type)+'</b> by '+esc(e.by)+(e.note?' &mdash; '+esc(e.note):'')+'<div style="color:var(--text3);font-size:11px">'+when+'</div></div>'
          +'</div>';
      }).join('');
  var noteId = kind==='task' ? 'jv-activity-note' : 'lead-activity-note';
  return '<div class="detail-section"><div class="detail-section-title">Activity Log</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">'
    +'<input id="'+noteId+'" class="form-input" placeholder="Optional note..." style="flex:1;min-width:120px;font-size:12px">'
    +'<button class="btn btn-secondary btn-sm" onclick="logActivity(\''+kind+'\','+id+',\'Called\',document.getElementById(\''+noteId+'\').value)">&#128222; Log Call</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="logActivity(\''+kind+'\','+id+',\'Texted\',document.getElementById(\''+noteId+'\').value)">&#128172; Log Text</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="logActivity(\''+kind+'\','+id+',\'Followed Up\',document.getElementById(\''+noteId+'\').value)">&#9989; Log Follow-up</button>'
    +'</div>'
    +'<div style="max-height:180px;overflow-y:auto">'+list+'</div>'
    +'</div>';
}

let activityCheckpoint = localStorage.getItem('crm_activity_checkpoint') || '1970-01-01T00:00:00.000Z';
let pendingActivityEntries = [];
function computePendingActivity(){
  var entries = [];
  leads.forEach(function(l){
    if(l.deleted) return;
    (l.activityLog||[]).forEach(function(e){
      if(e.at > activityCheckpoint) entries.push({kind:'lead', id:l.id, label:l.address||l.name||'Lead #'+l.id, type:e.type, by:e.by, at:e.at, note:e.note});
    });
  });
  jvLeads.forEach(function(l){
    if(l.deleted) return;
    (l.activityLog||[]).forEach(function(e){
      if(e.at > activityCheckpoint) entries.push({kind:'task', id:l.id, label:l.location||l.name||'Task #'+l.id, type:e.type, by:e.by, at:e.at, note:e.note});
    });
  });
  entries.sort(function(a,b){ return new Date(b.at) - new Date(a.at); });
  pendingActivityEntries = entries;
}
function activityBannerHTML(){
  if(pendingActivityEntries.length===0) return '';
  return '<div style="background:#fef3c7;border-bottom:1px solid #fcd34d;padding:8px 24px;display:flex;align-items:center;justify-content:space-between;font-size:13px">'
    +'<span>&#128276; <b>'+pendingActivityEntries.length+'</b> new activity update'+(pendingActivityEntries.length===1?'':'s')+' since your last visit</span>'
    +'<span><button class="btn btn-sm btn-secondary" onclick="viewActivityBanner()">View</button> <button class="btn btn-sm btn-secondary" onclick="dismissActivityBanner()">Dismiss</button></span>'
    +'</div>';
}
function dismissActivityBanner(){
  activityCheckpoint = new Date().toISOString();
  localStorage.setItem('crm_activity_checkpoint', activityCheckpoint);
  pendingActivityEntries = [];
  render();
}
function viewActivityBanner(){
  var frozen = pendingActivityEntries.slice();
  var rows = frozen.map(function(e){
    var when = new Date(e.at).toLocaleString();
    return '<div onclick="closeModal();goToSearchResult(\''+e.kind+'\','+e.id+')" style="padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer">'
      +'<div style="font-weight:600;font-size:13px">'+activityIcon(e.type)+' '+esc(e.type)+' &mdash; '+esc(e.label)+'</div>'
      +'<div style="font-size:11px;color:var(--text3)">by '+esc(e.by)+(e.note?' &middot; '+esc(e.note):'')+' &middot; '+when+'</div>'
      +'</div>';
  }).join('');
  document.getElementById('modal-container').innerHTML = '<div class="modal-overlay" onclick="overlayClick(event)"><div class="modal" style="max-width:480px"><div class="modal-header"><div class="modal-title">&#128276; Recent Activity</div><button class="modal-close-btn" onclick="closeModal()">&#10005;</button></div><div class="modal-body">'+rows+'</div><div class="modal-footer"><button class="btn btn-primary" onclick="dismissActivityBanner();closeModal()">Mark All Seen</button></div></div></div>';
}

// ===== Trash: view/restore/permanently-delete soft-deleted leads and tasks =====
function showTrash(){
  var deadLeads = leads.filter(function(l){return l.deleted;}).map(function(l){ return Object.assign({kind:'lead'}, l); });
  var deadTasks = jvLeads.filter(function(l){return l.deleted;}).map(function(l){ return Object.assign({kind:'task'}, l); });
  var combined = deadLeads.concat(deadTasks).sort(function(a,b){
    var da=a.deletedAt||'', db=b.deletedAt||'';
    return db>da?1:db<da?-1:0;
  });
  var rows = combined.length===0
    ? '<div style="padding:20px 0;text-align:center;color:var(--text3);font-size:13px">Trash is empty</div>'
    : combined.map(function(l){
        var label = l.kind==='task' ? (l.location||l.name||'Task #'+l.id) : (l.address||l.name||'Lead #'+l.id);
        var badge = l.kind==='task' ? '<span style="font-size:9px;font-weight:900;color:#0369a1;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:4px;padding:1px 5px;margin-right:6px">TASK</span>' : '<span style="font-size:9px;font-weight:900;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1px 5px;margin-right:6px">DMV</span>';
        var when = l.deletedAt ? new Date(l.deletedAt).toLocaleString() : '';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">'
          + '<div>' + badge + '<span style="font-weight:600;font-size:13px">'+esc(label)+'</span><div style="font-size:11px;color:var(--text3);margin-top:2px">Deleted '+when+'</div></div>'
          + '<div style="display:flex;gap:6px"><button class="btn btn-secondary btn-sm" onclick="restoreFromTrash(\''+l.kind+'\','+l.id+')">&#8617; Restore</button><button class="btn btn-danger btn-sm" onclick="permanentlyDelete(\''+l.kind+'\','+l.id+')">Delete Forever</button></div>'
          + '</div>';
      }).join('');
  document.getElementById('modal-container').innerHTML = '<div class="modal-overlay" onclick="overlayClick(event)"><div class="modal" style="max-width:560px"><div class="modal-header"><div class="modal-title">&#128465; Trash</div><button class="modal-close-btn" onclick="closeModal()">&#10005;</button></div><div class="modal-body">'
    + '<p style="font-size:12px;color:var(--text3);margin-bottom:10px">Deleted leads and tasks stay here until you restore them or delete them forever.</p>'
    + rows
    + '</div><div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button></div></div></div>';
}
function restoreFromTrash(kind, id){
  if(kind==='task'){
    var l = jvLeads.find(function(x){return x.id===id;});
    if(!l) return;
    l.deleted=false; l.deletedAt='';
    saveJV(); saveJVToSupabase(l);
  } else {
    var l2 = leads.find(function(x){return x.id===id;});
    if(!l2) return;
    l2.deleted=false; l2.deletedAt='';
    save(); saveLeadToSupabase(l2);
  }
  showTrash(); render();
  showToast('Restored','success');
}
function permanentlyDelete(kind, id){
  if(!confirm('Permanently delete this? This truly cannot be undone.')) return;
  if(kind==='task'){
    jvLeads = jvLeads.filter(function(x){return x.id!==id;});
    saveJV(); deleteJVFromSupabase(id);
  } else {
    leads = leads.filter(function(x){return x.id!==id;});
    save(); deleteLeadFromSupabase(id);
  }
  showTrash(); render();
  showToast('Permanently deleted','warning');
}

