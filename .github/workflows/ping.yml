async function loadFromSupabase() {
  try {
    showSyncStatus('loading');
    const rows = await sbFetch('leads?select=*&order=id.asc&limit=1000');
    if (rows && rows.length > 0) {
      // Cloud has data -- always use cloud as source of truth
      leads = rows.map(fromRow);
      localStorage.setItem('crm_leads', JSON.stringify(leads));
      showSyncStatus('synced');
      return true;
    }
    // Cloud is empty -- upload our local leads
    showSyncStatus('uploading');
    await uploadAllToSupabase();
    return true;
  } catch(e) {
    // Offline or error -- use localStorage silently, no cache clear needed
    showSyncStatus('offline');
    const stored = localStorage.getItem('crm_leads');
    if (stored) {
      try { leads = JSON.parse(stored); } catch(e2) { leads = RAW_DATA.map(l=>({...l,followUpDate:l.followUpDate||'',nationwide:l.nationwide||''})); }
    } else {
      leads = RAW_DATA.map(l=>({...l,followUpDate:l.followUpDate||'',nationwide:l.nationwide||''}));
    }
    return false;
  }
}

async function uploadAllToSupabase() {
  try {
    showSyncStatus('uploading');
    // Delete all then insert fresh
    await sbFetch('leads?id=gte.0', 'DELETE');
    // Insert in batches of 50
    for (let i = 0; i < leads.length; i += 50) {
      const batch = leads.slice(i, i+50).map(toRow);
      await sbFetch('leads', 'POST', batch);
    }
    showSyncStatus('synced');
    showToast('✅ All ' + leads.length + ' leads uploaded to cloud!', 'success');
  } catch(e) {
    console.error('Upload error:', e);
    showSyncStatus('offline');
  }
}

async function saveLeadToSupabase(l) {
  try {
    var row = toRow(l);
    // Upsert: insert or update in one call -- works on all browsers
    await fetch(SUPABASE_URL + '/rest/v1/leads', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify([row])
    });
  } catch(e) {
    console.error('Save error:', e);
  }
}

async function deleteLeadFromSupabase(id) {
  try {
    await sbFetch('leads?id=eq.' + id, 'DELETE');
  } catch(e) {
    console.error('Delete error:', e);
  }
}

