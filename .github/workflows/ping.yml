function jvToggleSelect(id,checked){if(checked)jvSelectedLeads.add(id);else jvSelectedLeads.delete(id);renderJVLeadsTab();}
function jvToggleSelectAll(checked){var filtered=jvLeads;if(checked)filtered.forEach(function(l){jvSelectedLeads.add(l.id);});else jvSelectedLeads.clear();renderJVLeadsTab();}
function jvClearSelection(){jvSelectedLeads.clear();renderJVLeadsTab();}
function jvDeleteSelected(){
  var count=jvSelectedLeads.size;
  if(!count) return;
  if(!confirm('Delete '+count+' selected JV lead'+(count!==1?'s':'')+'?')) return;
  var now=new Date().toISOString();
  var affected=jvLeads.filter(function(l){return jvSelectedLeads.has(l.id);});
  affected.forEach(function(l){ l.deleted=true; l.deletedAt=now; });
  jvSelectedLeads.clear();
  saveJV();
  affected.forEach(function(l){saveJVToSupabase(l);});
  renderJVLeadsTab();
  showToast('Deleted '+count+' JV leads','warning',function(){
    affected.forEach(function(l){ l.deleted=false; l.deletedAt=''; });
    saveJV(); renderJVLeadsTab();
    affected.forEach(function(l){saveJVToSupabase(l);});
    showToast('Restored','success');
  });
}
