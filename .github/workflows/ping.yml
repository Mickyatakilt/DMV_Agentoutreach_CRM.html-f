          +'</div>';
      }).join('');
  document.getElementById('modal-container').innerHTML = '<div class="modal-overlay" onclick="overlayClick(event)"><div class="modal" style="max-width:480px"><div class="modal-header"><div class="modal-title">&#128101; Team Members</div><button class="modal-close-btn" onclick="closeModal()">&#10005;</button></div><div class="modal-body">'
    +'<p style="font-size:12px;color:var(--text3);margin-bottom:12px">Add teammates here so you can quickly send a lead to their email.</p>'
    +'<div id="team-list">'+rows+'</div>'
    +'<div style="display:flex;gap:6px;margin-top:12px"><input id="new-team-name" class="form-input" placeholder="Name" style="font-size:12px"><input id="new-team-email" class="form-input" placeholder="Email" style="font-size:12px"><button class="btn btn-primary btn-sm" onclick="addTeamMember()">Add</button></div>'
    +'</div><div class="modal-footer"><button class="btn btn-secondary btn-sm" onclick="closeModal()">Close</button></div></div></div>';
}

// Send a lead's key details to a teammate's email via a pre-filled mailto link (opens their default email app).
// Uses a small floating dropdown (not a modal swap) so it can be used on an Add/Edit form
// that hasn't been saved yet, without wiping out whatever the user has typed so far.
function toggleSendToTeamMenu(btn, kind, id){
  var existing = document.getElementById('send-team-menu');
  if(existing){ existing.remove(); if(existing.dataset.forBtn===btn.dataset.btnId) return; }
  var members = getTeamMembers();
  var menu = document.createElement('div');
  menu.id = 'send-team-menu';
  btn.dataset.btnId = btn.dataset.btnId || ('stb'+Date.now());
  menu.dataset.forBtn = btn.dataset.btnId;
  menu.style.cssText = 'position:absolute;z-index:500;background:#fff;border:1.5px solid var(--border);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:220px;max-height:260px;overflow-y:auto;padding:6px';
  menu.innerHTML = members.length===0
    ? '<div style="padding:8px 10px;font-size:12px;color:var(--text3)">No team members yet.<br><a href="#" onclick="showTeamManager();return false;" style="color:var(--accent)">Add one first</a></div>'
    : members.map(function(m,i){
        return '<div onclick="sendLeadEmailNow(\''+kind+'\','+(id===null?'null':id)+','+i+')" style="padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px" onmouseover="this.style.background=\'var(--surface3)\'" onmouseout="this.style.background=\'\'"><b>'+esc(m.name)+'</b><br><span style="font-size:11px;color:var(--text3)">'+esc(m.email)+'</span></div>';
      }).join('');
  document.body.appendChild(menu);
  var rect = btn.getBoundingClientRect();
  menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  menu.style.left = (rect.left + window.scrollX) + 'px';
  setTimeout(function(){
    document.addEventListener('click', function closeMenu(e){
      if(!menu.contains(e.target) && e.target!==btn){ menu.remove(); document.removeEventListener('click', closeMenu); }
    });
  },0);
}
function sendLeadEmailNow(kind, id, memberIdx){
  var members = getTeamMembers();
  var m = members[memberIdx];
  if(!m) return;
  var name, phone, askingPrice, address;
  if(id!==null){
    // Existing saved lead/task (detail view)
    if(kind==='task'){
      var l = jvLeads.find(function(x){return x.id===id;});
      if(!l) return;
      name = l.name; phone = l.phone; askingPrice = l.askingPrice; address = l.location;
    } else {
      var l2 = leads.find(function(x){return x.id===id;});
      if(!l2) return;
      name = l2.name; phone = l2.phone; askingPrice = l2.offer; address = l2.address;
    }
  } else {
    // Not-yet-saved Add/Edit form — read straight from the open input fields
    if(kind==='task'){
      name = (document.getElementById('t-name')||{}).value || '';
      phone = (document.getElementById('t-phone')||{}).value || '';
      askingPrice = (document.getElementById('t-askingprice')||{}).value || '';
      address = (document.getElementById('t-location')||{}).value || '';
    } else {
      name = (document.getElementById('f-name')||{}).value || '';
      phone = (document.getElementById('f-phone')||{}).value || '';
      askingPrice = (document.getElementById('f-offer')||{}).value || '';
      address = (document.getElementById('f-address')||{}).value || '';
    }
  }
  var subject = 'New Property Lead from M Estate' + (address ? ' — ' + address : '');
  var todayFormatted = new Date().toLocaleDateString('en-US', {year:'numeric', month:'long', day:'numeric'});
  var body = 'Hi,\n\n'
    + 'M Estate has a new property lead for you to review and follow up on.\n\n'
    + 'Date: ' + todayFormatted + '\n'
    + 'Name: ' + (name||'') + '\n'
    + 'Phone: ' + (phone||'') + '\n'
    + 'Asking Price: ' + (askingPrice||'') + '\n'
    + 'Address: ' + (address||'');
  if(kind==='lead' && id!==null){
    var baseUrl = GITHUB_PAGES_URL;
    body += '\n\nUpdate this lead directly: ' + baseUrl + '?shared=lead&id=' + id;
    var sharedLead = leads.find(function(x){return x.id===id;});
    if(sharedLead){
      sharedLead.shared = true;
      sharedLead.sharedAt = new Date().toISOString();
      sharedLead.sharedWith = m.email;
      localStorage.setItem('crm_leads', JSON.stringify(leads));
      saveLeadToSupabase(sharedLead);
    }
  } else if(kind==='task' && id!==null){
    var baseUrlT = GITHUB_PAGES_URL;
    body += '\n\nUpdate this lead directly: ' + baseUrlT + '?shared=task&id=' + id;
    var sharedTask = jvLeads.find(function(x){return x.id===id;});
    if(sharedTask){
      sharedTask.shared = true;
      sharedTask.sharedAt = new Date().toISOString();
      sharedTask.sharedWith = m.email;
      saveJV();
      saveJVToSupabase(sharedTask);
    }
  }
  var mailto = 'mailto:' + encodeURIComponent(m.email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
  window.location.href = mailto;
  var menu = document.getElementById('send-team-menu'); if(menu) menu.remove();
}

function onGlobalSearch(q){
  var box = document.getElementById('global-search-results');
  if(!box) return;
  var query = (q||'').trim().toLowerCase();
  if(query.length<2){ box.style.display='none'; box.innerHTML=''; return; }
  var results = [];
  leads.forEach(function(l){
    if(l.deleted) return;
    if((l.address||'').toLowerCase().includes(query) || (l.name||'').toLowerCase().includes(query) || (l.phone||'').toLowerCase().includes(query)){
      results.push({type: l.nationwide==='Yes'?'nationwide':'dmv', id:l.id, title:l.address||l.name||'(no address)', sub:[l.name,l.phone].filter(Boolean).join(' &middot; ')});
    }
  });
  jvLeads.forEach(function(l){
    if(l.deleted) return;
    if((l.name||'').toLowerCase().includes(query) || (l.phone||'').toLowerCase().includes(query) || (l.location||'').toLowerCase().includes(query)){
      results.push({type:'task', id:l.id, title:l.name||'(no name)', sub:[l.location,l.phone].filter(Boolean).join(' &middot; ')});
    }
  });
  if(results.length===0){
    box.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:var(--text3)">No matches</div>';
    box.style.display='block';
    return;
  }
  box.innerHTML = results.slice(0,8).map(function(r){
    var badge = r.type==='dmv' ? '<span style="font-size:9px;font-weight:900;color:#dc2626;background:#fee2e2;border:1px solid #fca5a5;border-radius:4px;padding:1px 5px;margin-right:6px">DMV</span>'
      : r.type==='nationwide' ? '<span style="font-size:9px;font-weight:900;color:#7c3aed;background:#ede9fe;border:1px solid #c4b5fd;border-radius:4px;padding:1px 5px;margin-right:6px">NATIONWIDE</span>'
      : '<span style="font-size:9px;font-weight:900;color:#0369a1;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:4px;padding:1px 5px;margin-right:6px">TASK</span>';
    return '<div onmousedown="goToSearchResult(\''+r.type+'\','+r.id+')" style="padding:8px 14px;cursor:pointer;border-bottom:1px solid var(--border)">'
      + '<div>'+badge+'<span style="font-weight:600;font-size:13px">'+esc(r.title)+'</span></div>'
      + (r.sub?'<div style="font-size:11px;color:var(--text3);margin-top:2px">'+esc(r.sub)+'</div>':'')
      + '</div>';
  }).join('');
  box.style.display='block';
}
function goToSearchResult(type,id){
  var box = document.getElementById('global-search-results');
  if(box){ box.style.display='none'; box.innerHTML=''; }
  var input = document.getElementById('global-search');
  if(input) input.value='';
  if(type==='task'){ setTab('jvleads'); openJVDetail(id); }
  else if(type==='nationwide'){ setTab('nationwide'); openDetail(id); }
  else { setTab('leads'); openDetail(id); }
}
document.addEventListener('click', function(e){
  var box = document.getElementById('global-search-results');
  var input = document.getElementById('global-search');
  if(!box || !input) return;
  if(e.target!==input && !box.contains(e.target)) { box.style.display='none'; }
});
function overlayClick(e){if(e.target===e.currentTarget)closeModal();}
function showToast(msg,type='success',undoFn){
  const t=document.getElementById('toast');
  if(undoFn){
    window.__toastUndo=undoFn;
    t.innerHTML=esc(msg)+' <button onclick="window.__toastUndo&&window.__toastUndo();window.__toastUndo=null;document.getElementById(\'toast\').className=\'toast\';" style="margin-left:10px;background:#fff;color:#111;border:none;border-radius:4px;padding:2px 10px;font-weight:700;cursor:pointer;font-size:12px">Undo</button>';
  } else {
    t.textContent=msg;
  }
  t.className='toast '+type+' show';
  setTimeout(()=>{t.className='toast';window.__toastUndo=null;},undoFn?6000:3000);
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

// STARTUP -- works on Chrome, Safari, Firefox, Edge, any computer
// 1. Show local data instantly (no waiting)
// 2. Sync with Supabase cloud in background
// 3. Re-render with latest cloud data
// 4. Auto-refresh every 30 seconds to catch changes from other users
async function initFullApp() {
  // Step 1: Load local data immediately so UI shows fast
  try {
    var stored = localStorage.getItem('crm_leads');
    if(stored) leads = JSON.parse(stored);
  } catch(e) {}
  if(!leads || leads.length === 0) {
    leads = RAW_DATA.map(function(l){ return Object.assign({},l,{followUpDate:l.followUpDate||'',nationwide:l.nationwide||''}); });
  }
  computePendingActivity();
  render();

  // Step 2: Sync with cloud
  var synced = await loadFromSupabase();
  await loadJVFromSupabase();
  if(synced) { computePendingActivity(); render(); }
  computePendingActivity(); render();

  // Step 3: Auto-refresh every 30 seconds to catch other users' changes
  setInterval(async function() {
    try {
      var rows = await sbFetch('leads?select=*&order=id.asc&limit=1000');
      if(rows && rows.length > 0) {
        var newLeads = rows.map(fromRow);
        // Only re-render if data actually changed
        if(JSON.stringify(newLeads) !== JSON.stringify(leads)) {
          leads = newLeads;
          localStorage.setItem('crm_leads', JSON.stringify(leads));
          showSyncStatus('synced');
          computePendingActivity();
          render();
        }
      }
    } catch(e) { showSyncStatus('offline'); }
  }, 30000);

  // Step 4: Same 30-second auto-refresh for Tasks
  setInterval(async function() {
    try {
      var jvRows = await sbFetch('jv_leads?select=*&order=id.asc&limit=1000');
      if(jvRows && jvRows.length > 0) {
        var newJV = jvRows.map(fromJVRow);
        if(JSON.stringify(newJV) !== JSON.stringify(jvLeads)) {
          jvLeads = newJV;
          saveJV();
          computePendingActivity();
          render();
        }
      }
    } catch(e) {}
  }, 30000);
}

// ===== Shared single-lead view =====
// A restricted link (?shared=lead&id=123) that shows ONLY that one lead -- no other tabs,
// no other leads, no login. Recipient can view details/links and adjust Marketing Type,
// Status, Follow-Up Date, and Notes only. Saves go straight to Supabase by that lead's id.
async function initSharedLeadView(id) {
  document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:var(--text3)">Loading lead...</div>';
  var lead = null;
  try {
    var rows = await sbFetch('leads?id=eq.' + id + '&select=*');
    if(rows && rows.length > 0) lead = fromRow(rows[0]);
  } catch(e) {}
  if(!lead) {
    document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:var(--text3)"><h2>Lead not found</h2><p>This link may be out of date. Please ask for a new one.</p></div>';
    return;
  }
  renderSharedLeadView(lead);
}
