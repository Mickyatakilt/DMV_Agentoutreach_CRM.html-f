  const hasFilter=filters.status||filters.month||filters.source||filters.search||activeStatFilter;

  const statDots=[
    {label:'Total',val:stats.total,color:'#1e40af',filter:''},
    {label:'Sold',val:stats['Sold']||0,color:'#16a34a',filter:'Sold'},
    {label:'Pending',val:stats['Pending']||0,color:'#b45309',filter:'Pending'},
    {label:'Rejected',val:stats['Offer Rejected']||0,color:'#dc2626',filter:'Offer Rejected'},
    {label:'Pass',val:stats['Pass']||0,color:'#475569',filter:'Pass'},
    {label:'Offer Sent',val:stats['Offer Sent']||0,color:'#2563eb',filter:'Offer Sent'},
    {label:'Foreclosure',val:stats['Foreclosure']||0,color:'#ea580c',filter:'Foreclosure'},
    {label:'Off-Market',val:stats['Off-Market']||0,color:'#7c3aed',filter:'Off-Market'},
  ].map(c=>`<div class="stat-card ${activeStatFilter===c.filter&&c.filter?'active':''}" onclick="setStatFilter('${c.filter}')"><div class="stat-dot" style="background:${c.color}"></div><div><div class="stat-num">${c.val}</div><div class="stat-label">${c.label}</div></div></div>`).join('');

  // Include nationwide follow-ups in DMV tab stats too
  const allFUCount = leads.filter(l=>!l.deleted&&l.followUpDate).length + jvLeads.filter(l=>!l.deleted&&l.followUpDate).length;
  const allOverdue = leads.filter(l=>!l.deleted&&l.followUpDate&&getFUStatus(l.followUpDate)==='overdue').length + jvLeads.filter(l=>!l.deleted&&l.followUpDate&&getFUStatus(l.followUpDate)==='overdue').length;
  const allToday = leads.filter(l=>!l.deleted&&l.followUpDate&&getFUStatus(l.followUpDate)==='today').length + jvLeads.filter(l=>!l.deleted&&l.followUpDate&&getFUStatus(l.followUpDate)==='today').length;
  const overdueChip=`<div class="stat-card" onclick="setTab('followups')" style="${allOverdue>0?'border-color:#fca5a5;background:#fee2e2;':''}"><div class="stat-dot" style="background:#dc2626"></div><div><div class="stat-num" style="${allOverdue>0?'color:#dc2626':''}">${allOverdue}</div><div class="stat-label" style="${allOverdue>0?'color:#dc2626':''}">Overdue</div></div></div>`;
  const fuChip=`<div class="stat-card" onclick="setTab('followups')" style="${allToday>0?'border-color:#fcd34d;background:#fef3c7;':'border-color:#5eead4;background:#f0fdfa;'}"><div class="stat-dot" style="background:${allToday>0?'#b45309':'#0d9488'}"></div><div><div class="stat-num" style="color:${allToday>0?'#b45309':'#0d9488'}">${allToday>0?allToday:allFUCount}</div><div class="stat-label" style="color:${allToday>0?'#b45309':'#0d9488'}">${allToday>0?'Due Today':'Follow-Ups'}</div></div></div>`;

  const hot=leads.filter(l=>l.score==='Hot').length;
  const warm=leads.filter(l=>l.score==='Warm').length;
  const cold=leads.filter(l=>l.score==='Cold').length;
  const scoreChip=`<div class="stat-card" onclick="leadScoreFilter='';renderLeadsTab()" style="cursor:default"><div style="display:flex;gap:10px;align-items:center;font-size:12px;font-weight:700">
      <span onclick="event.stopPropagation();leadScoreFilter=leadScoreFilter==='Hot'?'':'Hot';renderLeadsTab()" style="cursor:pointer;color:#dc2626;${leadScoreFilter==='Hot'?'text-decoration:underline':''}">&#128308; ${hot} Hot</span>
      <span onclick="event.stopPropagation();leadScoreFilter=leadScoreFilter==='Warm'?'':'Warm';renderLeadsTab()" style="cursor:pointer;color:#b45309;${leadScoreFilter==='Warm'?'text-decoration:underline':''}">&#128993; ${warm} Warm</span>
      <span onclick="event.stopPropagation();leadScoreFilter=leadScoreFilter==='Cold'?'':'Cold';renderLeadsTab()" style="cursor:pointer;color:#2563eb;${leadScoreFilter==='Cold'?'text-decoration:underline':''}">&#128309; ${cold} Cold</span>
    </div></div>`;

  const monthOpts=dd.months.map(m=>`<option value="${m}" ${filters.month===m?'selected':''}>${m}</option>`).join('');
  const statusOpts=dd.statuses.map(s=>`<option value="${s}" ${filters.status===s?'selected':''}>${s}</option>`).join('');
  const sourceOpts=dd.sources.map(s=>`<option value="${s}" ${filters.source===s?'selected':''}>${s}</option>`).join('');

  const bulkBar=selCount>0?`
    <div style="background:#fff3cd;border:1.5px solid #fcd34d;border-radius:8px;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;margin:8px 24px 0;">
      <span style="font-size:13px;font-weight:600;color:#b45309">&#10003; ${selCount} lead${selCount!==1?'s':''} selected</span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="clearSelection()">Clear</button>
        <button class="btn btn-danger btn-sm" onclick="deleteSelected()">&#128465; Delete ${selCount} Selected</button>
      </div>
    </div>`:'';

  const delFilterBtn=hasFilter?`<button class="btn btn-danger btn-sm" onclick="deleteAllFiltered()">&#128465; Delete All ${filtered.length}</button>`:'';

  const content=filtered.length===0
    ?'<div class="empty"><div class="empty-icon">&#128269;</div><h3>No leads match your filters</h3></div>'
    :(view==='table'?renderTable(filtered,start,end):renderCards(filtered,start,end));

  document.getElementById('tab-content').innerHTML=`
    <div class="stats-bar">${statDots}${overdueChip}${fuChip}${scoreChip}</div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" placeholder="Search address, name, phone..." value="${esc(filters.search)}" oninput="onSearch(this.value)"></div>
      <div class="filter-group">
        <select onchange="onFilter('month',this.value)"><option value="">All Months</option>${monthOpts}</select>
        <select onchange="onFilter('status',this.value)"><option value="">All Statuses</option>${statusOpts}</select>
        <select onchange="onFilter('source',this.value)"><option value="">All Sources</option>${sourceOpts}</select>
        <select onchange="leadScoreFilter=this.value;renderLeadsTab()"><option value="">All Scores</option><option value="Hot" ${leadScoreFilter==='Hot'?'selected':''}>&#128308; Hot</option><option value="Warm" ${leadScoreFilter==='Warm'?'selected':''}>&#128993; Warm</option><option value="Cold" ${leadScoreFilter==='Cold'?'selected':''}>&#128309; Cold</option></select>
      </div>
      <div class="toolbar-right">
        <span class="result-count">${filtered.length} leads</span>
        ${delFilterBtn}
        <div class="view-toggle">
          <button class="${view==='table'?'active':''}" onclick="setView('table')">&#9776; Table</button>
          <button class="${view==='cards'?'active':''}" onclick="setView('cards')">&#8862; Cards</button>
        </div>
        <button class="btn btn-primary" onclick="openAdd()">+ Add Lead</button>
      </div>
    </div>
    ${bulkBar}
    ${content}
    ${filtered.length>PAGE_SIZE?renderPagination(filtered.length):''}`;
}

function renderTable(data,start,end){
  const si=f=>sortField===f?(sortDir===1?'&#8593;':'&#8595;'):'<span style="opacity:.3">&#8597;</span>';
  const rows=data.slice(start,end).map(l=>`
    <tr style="${selectedLeads.has(l.id)?'background:#eff6ff;':''}">
      <td onclick="event.stopPropagation()"><input type="checkbox" ${selectedLeads.has(l.id)?'checked':''} onchange="toggleSelect(${l.id},this.checked)" style="width:15px;height:15px;cursor:pointer"></td>
      <td onclick="openDetail(${l.id})"><div class="address-cell">${esc(l.address)||''}</div></td>
      <td onclick="openDetail(${l.id})"><div class="phone-cell">${l.phone?`<a href="#" data-phone="${l.phone.split('/')[0].trim()}" onclick="openGHL(this.dataset.phone,event);event.stopPropagation()" style="color:var(--accent);text-decoration:none;font-weight:600" title="Open in GoHighLevel">${esc(l.phone.split('/')[0].trim())} &#8599;</a>`:''}</div></td>
      <td onclick="openDetail(${l.id})"><span class="money-val">${formatMoney(l.offer)}</span></td>
      <td onclick="openDetail(${l.id})"><span class="arv-val">${formatMoney(l.arv)}</span></td>
      <td onclick="openDetail(${l.id})" style="font-size:12px;color:var(--text2)">${esc(l.marketingType)||''}</td>
      <td onclick="openDetail(${l.id})">${statusBadge(l.status)}</td>
      <td onclick="openDetail(${l.id})">${leadScoreBadgeHTML(l.score)}</td>
      <td onclick="openDetail(${l.id})">${l.followUpDate?followUpChip(l.followUpDate):'<span style="color:var(--text4);font-size:11px">&#8212;</span>'}</td>
      <td>${l.webLink&&l.webLink.startsWith('http')?`<a href="${esc(l.webLink)}" target="_blank" class="detail-link" onclick="event.stopPropagation()">&#8599;</a>`:''}</td>
      <td onclick="openDetail(${l.id})"><span class="month-tag">${l.month}</span></td>
    </tr>`).join('');
  return `<div class="table-container"><div class="table-wrap"><table>
    <thead><tr>
      <th style="width:36px"><input type="checkbox" onchange="toggleSelectAll(this.checked)" style="width:15px;height:15px;cursor:pointer"></th>
      <th onclick="setSort('address')">Property ${si('address')}</th>
      <th onclick="setSort('phone')">Phone ${si('phone')}</th>
      <th onclick="setSort('offer')">Offer ${si('offer')}</th>
      <th onclick="setSort('arv')">ARV ${si('arv')}</th>
      <th onclick="setSort('marketingType')">Marketing ${si('marketingType')}</th>
      <th onclick="setSort('status')">Status ${si('status')}</th>
      <th>Score</th>
      <th onclick="setSort('followUpDate')">Follow-Up ${si('followUpDate')}</th>
      <th>Link</th>
      <th onclick="setSort('month')">Month ${si('month')}</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
}

function toggleSelect(id,checked){if(checked)selectedLeads.add(id);else selectedLeads.delete(id);renderLeadsTab();}
function toggleSelectAll(checked){const filtered=getFiltered();const page=filtered.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);if(checked)page.forEach(l=>selectedLeads.add(l.id));else page.forEach(l=>selectedLeads.delete(l.id));renderLeadsTab();}
function clearSelection(){selectedLeads.clear();renderLeadsTab();}
function deleteSelected(){
  const count=selectedLeads.size;
  if(!count) return;
  if(!confirm(`Delete ${count} selected lead${count!==1?'s':''}?`)) return;
  const delIds=[...selectedLeads];
  const now=new Date().toISOString();
  const affected=leads.filter(l=>selectedLeads.has(l.id));
  affected.forEach(l=>{ l.deleted=true; l.deletedAt=now; });
  selectedLeads.clear();save();render();
  affected.forEach(l=>saveLeadToSupabase(l));
  showToast(`Deleted ${count} leads`,'warning',function(){
    affected.forEach(l=>{ l.deleted=false; l.deletedAt=''; });
    save(); render();
    affected.forEach(l=>saveLeadToSupabase(l));
    showToast('Restored','success');
  });
}
function deleteAllFiltered(){
  const filtered=getFiltered();
  if(!filtered.length) return;
  if(!confirm(`Delete ALL ${filtered.length} filtered leads?`)) return;
  const now=new Date().toISOString();
  const affected=filtered.slice();
  affected.forEach(l=>{ l.deleted=true; l.deletedAt=now; });
  selectedLeads.clear();
  filters={search:'',status:'',month:'',source:''};
  activeStatFilter='';
  save();render();
  affected.forEach(l=>saveLeadToSupabase(l));
  showToast(`Deleted ${affected.length} leads`,'warning',function(){
    affected.forEach(l=>{ l.deleted=false; l.deletedAt=''; });
    save(); render();
    affected.forEach(l=>saveLeadToSupabase(l));
    showToast('Restored','success');
  });
}

