// -- FILE ATTACHMENTS ----------------------------------------------------------
function getAttachments(leadType, leadId){
  var key = 'crm_attachments_'+leadType+'_'+leadId;
  try { return JSON.parse(localStorage.getItem(key)||'[]'); } catch(e){ return []; }
}
function saveAttachments(leadType, leadId, files){
  var key = 'crm_attachments_'+leadType+'_'+leadId;
  localStorage.setItem(key, JSON.stringify(files));
}
function downloadAttachment(leadType, leadId, idx){
  var files = getAttachments(leadType, leadId);
  var f = files[idx];
  if(!f) return;
  var a = document.createElement('a');
  a.href = f.data;
  a.download = f.name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); }, 100);
}
function deleteAttachment(leadType, leadId, idx){
  var files = getAttachments(leadType, leadId);
  files.splice(idx, 1);
  saveAttachments(leadType, leadId, files);
}
function renderAttachmentsSection(leadType, leadId){
  var files = getAttachments(leadType, leadId);
  var fileList = files.length === 0
    ? '<div style="font-size:12px;color:var(--text3);padding:8px 0">No attachments yet</div>'
    : files.map(function(f, i){
        return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">'
          + '<span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">&#128206; '+esc(f.name)+'</span>'
          + '<span style="font-size:10px;color:var(--text3)">'+f.size+'</span>'
          + '<button data-name="'+esc(f.name)+'" data-idx="'+i+'" data-type="'+leadType+'" data-lid="'+leadId+'" onclick="downloadAttachment(this.dataset.type,this.dataset.lid,parseInt(this.dataset.idx))" class="btn btn-secondary btn-sm" style="font-size:11px;padding:2px 8px">&#11015; Download</button>'
          + '<button data-type="'+leadType+'" data-lid="'+leadId+'" data-idx="'+i+'" onclick="deleteAttachment(this.dataset.type,this.dataset.lid,parseInt(this.dataset.idx));refreshAttachments(this.dataset.type,this.dataset.lid)" style="background:var(--red-bg);border:1px solid #fca5a5;color:var(--red);border-radius:5px;padding:2px 8px;cursor:pointer;font-size:11px">&#128465;</button>'
          + '</div>';
      }).join('');
  return '<div class="detail-section" id="attachments-section-'+leadType+'-'+leadId+'">'
    + '<div class="detail-section-title">&#128206; Attachments ('+files.length+')</div>'
    + fileList
    + '<div style="margin-top:10px;display:flex;align-items:center;gap:8px">'
    + '<input type="file" id="attach-input-'+leadType+'-'+leadId+'" multiple style="display:none" onchange="handleAttachFiles(this.dataset.type,this.dataset.lid,this)" data-type="'+leadType+'" data-lid="'+leadId+'">'
    + '<button data-type="'+leadType+'" data-lid="'+leadId+'" onclick="triggerAttachInput(this)" class="btn btn-secondary btn-sm">+ Add Files</button>'
    + '<span style="font-size:11px;color:var(--text3)">Screenshots, CSV, Excel, PDF, any file</span>'
    + '</div></div>';
}
function triggerAttachInput(btn){
  var inp = document.getElementById('attach-input-'+btn.dataset.type+'-'+btn.dataset.lid);
  if(inp) inp.click();
}
function handleAttachFiles(leadType, leadId, input){
  var files = Array.from(input.files);
  if(!files.length) return;
  var existing = getAttachments(leadType, leadId);
  var pending = files.length;
  files.forEach(function(file){
    var reader = new FileReader();
    reader.onload = function(e){
      var sizeKB = (file.size/1024).toFixed(1);
      var sizeStr = sizeKB > 1024 ? (sizeKB/1024).toFixed(1)+'MB' : sizeKB+'KB';
      existing.push({name: file.name, size: sizeStr, data: e.target.result, addedAt: today()});
      pending--;
      if(pending === 0){
        saveAttachments(leadType, leadId, existing);
        refreshAttachments(leadType, leadId);
        showToast(''+files.length+' file'+(files.length!==1?'s':'')+' attached!','success');
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}
function refreshAttachments(leadType, leadId){
  var section = document.getElementById('attachments-section-'+leadType+'-'+leadId);
  if(section){
    var temp = document.createElement('div');
    temp.innerHTML = renderAttachmentsSection(leadType, leadId);
    section.replaceWith(temp.firstChild);
  }
}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function today(){return new Date().toISOString().split('T')[0];}
function daysDiff(ds){if(!ds) return null; return Math.round((new Date(ds)-new Date(today()))/(1000*60*60*24));}
function getFUStatus(ds){const d=daysDiff(ds); if(d===null) return null; if(d<0) return 'overdue'; if(d===0) return 'today'; if(d<=3) return 'soon'; return 'future';}
function followUpChip(ds){
  if(!ds) return '';
  const st=getFUStatus(ds); const d=daysDiff(ds);
  const label=d<0?`${Math.abs(d)}d late`:d===0?'Today':`${d}d`;
  const cls={overdue:'followup-overdue',today:'followup-today',soon:'followup-soon',future:'followup-future'}[st];
  return `<span class="followup-chip ${cls}">&#128197; ${ds} (${label})</span>`;
}
