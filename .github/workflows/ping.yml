function saveEditTask(id){
  var l = jvLeads.find(function(x){return x.id===id;});
  if(!l) return;
  var addr = document.getElementById('t-location').value.trim();
  var dup = findJVDup(addr, id);
  if(dup && !confirm('Duplicate address found:\n"'+dup.location+'"\n\nSave anyway?')) return;
  var oldFollowUp = l.followUpDate;
  l.name = document.getElementById('t-name').value.trim();
  l.phone = document.getElementById('t-phone').value.trim();
  l.location = addr;
  l.askingPrice = document.getElementById('t-askingprice').value.trim();
  l.arv = document.getElementById('t-arv').value.trim();
  l.jvStatus = document.getElementById('t-status').value;
  l.score = document.getElementById('t-score').value;
  l.followUpDate = document.getElementById('t-followup').value;
  l.dateAdded = document.getElementById('t-date').value || today();
  l.notes = document.getElementById('t-notes').value.trim();
  if(l.followUpDate && l.followUpDate!==oldFollowUp){
    if(!l.activityLog) l.activityLog=[];
    l.activityLog.push({type:'Follow-Up Set',by:currentUser.name,at:new Date().toISOString(),note:'Follow-up scheduled for '+l.followUpDate});
  }
  // Save any new attachments
  if(newTaskAttachments.length > 0){
    var existing = getAttachments('task', id);
    saveAttachments('task', id, existing.concat(newTaskAttachments));
    newTaskAttachments = [];
  }
  saveJV();
  saveJVToSupabase(l);
  closeModal();
  renderJVLeadsTab();
  showToast('Task updated!','success');
}

