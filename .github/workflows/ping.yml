// ===== Route: shared single-lead link vs full app =====
(function(){
  var params = new URLSearchParams(window.location.search);
  var sharedKind = params.get('shared');
  var sharedId = params.get('id');
  if (sharedKind === 'lead' && sharedId) {
    initSharedLeadView(parseInt(sharedId, 10));
  } else if (sharedKind === 'task' && sharedId) {
    initSharedTaskView(parseInt(sharedId, 10));
  } else {
    initFullApp();
  }
})();
