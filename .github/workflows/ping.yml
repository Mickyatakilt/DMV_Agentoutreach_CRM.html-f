function addDropdownItem(key){
  const input=document.getElementById('new-'+key);
  const val=input.value.trim();
  if(!val){showToast('Please enter a value','error');return;}
  const dd=getDropdowns();
  if(dd[key].includes(val)){showToast('Already exists!','error');return;}
  dd[key].push(val);saveDropdowns(dd);input.value='';
  showToast('Added: '+val,'success');showDropdownManager();
}
function removeDropdownItem(key,index){
  event.stopPropagation();
  const dd=getDropdowns();
  if(!dd[key]||index<0||index>=dd[key].length) return;
  const item=dd[key][index];
  dd[key].splice(index,1);
  saveDropdowns(dd);
  showToast('Removed: '+item,'warning');
  showDropdownManager();
}

function updateStatusColor(status, prop, value){
  var sc = getStatusColors();
  if(!sc[status]) sc[status] = {bg:'#f1f5f9',color:'#475569',border:'#cbd5e1'};
  sc[status][prop] = value;
  // Auto-set border to slightly darker version of bg
  if(prop==='bg') sc[status].border = value;
  saveStatusColors(sc);
  // Re-render the color list live
  var dd2 = getDropdowns();
  var sc2 = getStatusColors();
  var rows = dd2.statuses.map(function(s){
    var c = sc2[s] || {bg:'#f1f5f9',color:'#475569',border:'#cbd5e1'};
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">'
      +'<span style="flex:1;font-size:13px;font-weight:600">'+s+'</span>'
      +'<span class="badge" style="background:'+c.bg+';color:'+c.color+';border-color:'+c.border+';min-width:80px;text-align:center">'+s+'</span>'
      +'<label style="font-size:11px;color:var(--text3)">BG</label>'
      +'<input type="color" value="'+c.bg+'" data-status="'+s+'" data-prop="bg" onchange="updateStatusColor(this.dataset.status,this.dataset.prop,this.value)" style="width:32px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px">'
      +'<label style="font-size:11px;color:var(--text3)">Text</label>'
      +'<input type="color" value="'+c.color+'" data-status="'+s+'" data-prop="color" onchange="updateStatusColor(this.dataset.status,this.dataset.prop,this.value)" style="width:32px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px">'
      +'<button data-status="'+s+'" onclick="resetStatusColor(this.dataset.status)" style="background:var(--surface3);border:1px solid var(--border);color:var(--text3);border-radius:5px;padding:2px 7px;cursor:pointer;font-size:10px">Reset</button>'
      +'</div>';
  }).join('');
  var el = document.getElementById('status-color-list');
  if(el) el.innerHTML = rows;
}

function resetStatusColor(status){
  var sc = getStatusColors();
  delete sc[status];
  saveStatusColors(sc);
  updateStatusColor(status, 'bg', (DEFAULT_STATUS_COLORS[status]||{bg:'#f1f5f9'}).bg);
}

