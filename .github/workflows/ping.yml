async function loadJVFromSupabase() {
  try {
    var r = await fetch(SUPABASE_URL + '/rest/v1/jv_leads?select=*&order=id.desc&limit=1000', {
      headers: {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY}
